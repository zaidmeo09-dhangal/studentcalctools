<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#2563eb">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator – Free & Instant Results (4.0 Scale)</title>
    <meta name="description" content="Calculate your GPA instantly using letter grades and credit hours on the 4.0 scale. Free online GPA calculator for college and high school students.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QFNEKR7QE0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-QFNEKR7QE0');
</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fb; color: #333; }
        header { background: #2563eb; color: white; padding: 20px; text-align: center; }
        header h1 { font-size: 24px; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { font-size: 18px; margin-bottom: 20px; color: #2563eb; }
        .course-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-add { background: #e0e7ff; color: #2563eb; margin-bottom: 20px; }
        .btn-calc { background: #2563eb; color: white; width: 100%; padding: 12px; font-size: 16px; }
        .btn-remove { background: #fee2e2; color: #dc2626; padding: 8px 12px; }
        .result { margin-top: 25px; background: #f0f7ff; padding: 20px; border-radius: 8px; text-align: center; display: none; }
        .result h3 { font-size: 16px; color: #555; }
        .result .gpa-score { font-size: 48px; font-weight: bold; color: #2563eb; }
        .labels { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 5px; font-size: 13px; color: #888; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-size: 14px; }
        footer { text-align: center; padding: 20px; font-size: 13px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>GPA Calculator</h1>
    </header>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h2>Enter Your Courses</h2>
        <div class="labels">
            <span>Course Name</span>
            <span>Grade</span>
            <span>Credits</span>
            <span></span>
        </div>
        <div id="courses">
            <div class="course-row">
                <input type="text" placeholder="e.g. Math 101">
                <select>
                    <option value="4.0">A</option>
                    <option value="3.7">A-</option>
                    <option value="3.3">B+</option>
                    <option value="3.0">B</option>
                    <option value="2.7">B-</option>
                    <option value="2.3">C+</option>
                    <option value="2.0">C</option>
                    <option value="1.7">C-</option>
                    <option value="1.3">D+</option>
                    <option value="1.0">D</option>
                    <option value="0.0">F</option>
                </select>
                <input type="number" placeholder="Credits" min="1" max="6" value="3">
                <button class="btn btn-remove" onclick="removeRow(this)">✕</button>
            </div>
        </div>
        <br>
        <button class="btn btn-add" onclick="addRow()">+ Add Course</button>
        <button class="btn btn-calc" onclick="calculateGPA()">Calculate GPA</button>
        <div class="result" id="result">
            <h3>Your GPA</h3>
            <div class="gpa-score" id="gpa-score">0.00</div>
        </div>
    </div>
    <footer>© 2025 StudentCalcTools — Free tools for students</footer>

    <script>
        function addRow() {
            const row = document.createElement('div');
            row.className = 'course-row';
            row.innerHTML = `
                <input type="text" placeholder="e.g. English 101">
                <select>
                    <option value="4.0">A</option>
                    <option value="3.7">A-</option>
                    <option value="3.3">B+</option>
                    <option value="3.0">B</option>
                    <option value="2.7">B-</option>
                    <option value="2.3">C+</option>
                    <option value="2.0">C</option>
                    <option value="1.7">C-</option>
                    <option value="1.3">D+</option>
                    <option value="1.0">D</option>
                    <option value="0.0">F</option>
                </select>
                <input type="number" placeholder="Credits" min="1" max="6" value="3">
                <button class="btn btn-remove" onclick="removeRow(this)">✕</button>
            `;
            document.getElementById('courses').appendChild(row);
        }

        function removeRow(btn) {
            const rows = document.querySelectorAll('.course-row');
            if (rows.length > 1) btn.parentElement.remove();
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('.course-row');
            let totalPoints = 0;
            let totalCredits = 0;
            rows.forEach(row => {
                const grade = parseFloat(row.querySelector('select').value);
                const credits = parseFloat(row.querySelector('input[type="number"]').value) || 0;
                totalPoints += grade * credits;
                totalCredits += credits;
            });
            const gpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : '0.00';
            document.getElementById('gpa-score').textContent = gpa;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
