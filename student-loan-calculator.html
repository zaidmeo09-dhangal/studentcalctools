<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Loan Calculator - Calculate Monthly Payments Free</title>
    <meta name="description" content="Calculate your student loan monthly payments, total interest and repayment schedule for free. Plan your student loan repayment easily.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QFNEKR7QE0"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-QFNEKR7QE0');</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#f4f7fb;color:#333;}
        header{background:#2563eb;color:white;padding:20px;text-align:center;}
        header h1{font-size:24px;}
        .container{max-width:600px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .back-link{display:inline-block;margin-bottom:20px;color:#2563eb;text-decoration:none;font-size:14px;}
        h2{font-size:18px;margin-bottom:20px;color:#2563eb;}
        .input-group{margin-bottom:15px;}
        label{display:block;font-size:14px;color:#555;margin-bottom:5px;}
        input{padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;width:100%;}
        .btn-calc{background:#2563eb;color:white;width:100%;padding:12px;font-size:16px;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
        .results{margin-top:25px;display:none;}
        .result-card{background:#f0f7ff;padding:20px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        .result-label{font-size:14px;color:#555;}
        .result-value{font-size:22px;font-weight:bold;color:#2563eb;}
        footer{text-align:center;padding:20px;font-size:13px;color:#888;margin-top:20px;}
    </style>
</head>
<body>
    <header><h1>Student Loan Calculator</h1></header>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h2>Calculate Your Loan Payments</h2>
        <div class="input-group">
            <label>Total Loan Amount ($)</label>
            <input type="number" id="loan" placeholder="e.g. 30000" min="0">
        </div>
        <div class="input-group">
            <label>Annual Interest Rate (%)</label>
            <input type="number" id="rate" placeholder="e.g. 5.5" min="0" step="0.1">
        </div>
        <div class="input-group">
            <label>Loan Term (Years)</label>
            <input type="number" id="years" placeholder="e.g. 10" min="1" max="30">
        </div>
        <button class="btn-calc" onclick="calculate()">Calculate</button>
        <div class="results" id="results">
            <div class="result-card"><span class="result-label">Monthly Payment</span><span class="result-value" id="monthly">$0</span></div>
            <div class="result-card"><span class="result-label">Total Payment</span><span class="result-value" id="total">$0</span></div>
            <div class="result-card"><span class="result-label">Total Interest</span><span class="result-value" id="interest">$0</span></div>
        </div>
    </div>
    <footer>© 2025 StudentCalcTools — Free tools for students</footer>
    <script>
        function calculate(){
            const loan=parseFloat(document.getElementById('loan').value)||0;
            const rate=parseFloat(document.getElementById('rate').value)||0;
            const years=parseFloat(document.getElementById('years').value)||0;
            if(!loan||!years){alert('Please fill all fields');return;}
            const monthlyRate=rate/100/12;
            const payments=years*12;
            let monthly;
            if(monthlyRate===0){monthly=loan/payments;}
            else{monthly=loan*(monthlyRate*Math.pow(1+monthlyRate,payments))/(Math.pow(1+monthlyRate,payments)-1);}
            const total=monthly*payments;
            const totalInterest=total-loan;
            document.getElementById('monthly').textContent='$'+monthly.toFixed(2);
            document.getElementById('total').textContent='$'+total.toFixed(2);
            document.getElementById('interest').textContent='$'+totalInterest.toFixed(2);
            document.getElementById('results').style.display='block';
        }
    </script>
</body>
</html>
