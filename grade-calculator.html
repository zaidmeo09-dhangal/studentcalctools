<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#2563eb">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator – Find Your Final Course Grade Free</title>
    <meta name="description" content="Calculate your weighted course grade instantly. Enter assignment scores and weights to see your letter grade and score needed on your final exam.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QFNEKR7QE0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-QFNEKR7QE0');

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f7fb; color: #333; }
        header { background: #2563eb; color: white; padding: 20px; text-align: center; }
        header h1 { font-size: 24px; }
        .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-size: 14px; }
        h2 { font-size: 18px; margin-bottom: 20px; color: #2563eb; }
        .labels { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 5px; font-size: 13px; color: #888; }
        .row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 10px; margin-bottom: 10px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-add { background: #e0e7ff; color: #2563eb; margin-bottom: 20px; }
        .btn-calc { background: #2563eb; color: white; width: 100%; padding: 12px; font-size: 16px; }
        .btn-remove { background: #fee2e2; color: #dc2626; padding: 8px 12px; }
        .result { margin-top: 25px; background: #f0f7ff; padding: 20px; border-radius: 8px; text-align: center; display: none; }
        .result h3 { font-size: 16px; color: #555; }
        .grade-score { font-size: 48px; font-weight: bold; color: #2563eb; }
        .grade-letter { font-size: 22px; color: #555; margin-top: 5px; }
        footer { text-align: center; padding: 20px; font-size: 13px; color: #888; margin-top: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>Grade Calculator</h1>
    </header>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h2>Enter Your Assignments & Grades</h2>
        <div class="labels">
            <span>Assignment</span>
            <span>Score (%)</span>
            <span>Weight (%)</span>
            <span></span>
        </div>
        <div id="rows">
            <div class="row">
                <input type="text" placeholder="e.g. Midterm Exam">
                <input type="number" placeholder="85" min="0" max="100">
                <input type="number" placeholder="30" min="0" max="100">
                <button class="btn btn-remove" onclick="removeRow(this)">✕</button>
            </div>
            <div class="row">
                <input type="text" placeholder="e.g. Final Exam">
                <input type="number" placeholder="90" min="0" max="100">
                <input type="number" placeholder="40" min="0" max="100">
                <button class="btn btn-remove" onclick="removeRow(this)">✕</button>
            </div>
            <div class="row">
                <input type="text" placeholder="e.g. Assignments">
                <input type="number" placeholder="78" min="0" max="100">
                <input type="number" placeholder="30" min="0" max="100">
                <button class="btn btn-remove" onclick="removeRow(this)">✕</button>
            </div>
        </div>
        <br>
        <button class="btn btn-add" onclick="addRow()">+ Add Row</button>
        <button class="btn btn-calc" onclick="calculateGrade()">Calculate Grade</button>
        <div class="result" id="result">
            <h3>Your Final Grade</h3>
            <div class="grade-score" id="grade-score">0%</div>
            <div class="grade-letter" id="grade-letter"></div>
        </div>
    </div>
    <footer>© 2025 StudentCalcTools — Free tools for students</footer>

    <script>
        function addRow() {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="text" placeholder="e.g. Quiz">
                <input type="number" placeholder="Score %" min="0" max="100">
                <input type="number" placeholder="Weight %" min="0" max="100">
                <button class="btn btn-remove" onclick="removeRow(this)">✕</button>
            `;
            document.getElementById('rows').appendChild(row);
        }

        function removeRow(btn) {
            const rows = document.querySelectorAll('.row');
            if (rows.length > 1) btn.parentElement.remove();
        }

        function getLetterGrade(grade) {
            if (grade >= 93) return 'A';
            if (grade >= 90) return 'A-';
            if (grade >= 87) return 'B+';
            if (grade >= 83) return 'B';
            if (grade >= 80) return 'B-';
            if (grade >= 77) return 'C+';
            if (grade >= 73) return 'C';
            if (grade >= 70) return 'C-';
            if (grade >= 67) return 'D+';
            if (grade >= 60) return 'D';
            return 'F';
        }

        function calculateGrade() {
            const rows = document.querySelectorAll('.row');
            let totalWeight = 0;
            let weightedScore = 0;
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input[type="number"]');
                const score = parseFloat(inputs[0].value) || 0;
                const weight = parseFloat(inputs[1].value) || 0;
                weightedScore += score * weight;
                totalWeight += weight;
            });
            const finalGrade = totalWeight > 0 ? (weightedScore / totalWeight).toFixed(2) : 0;
            document.getElementById('grade-score').textContent = finalGrade + '%';
            document.getElementById('grade-letter').textContent = 'Letter Grade: ' + getLetterGrade(finalGrade);
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
