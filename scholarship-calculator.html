<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#2563eb">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholarship Calculator – College Cost After Aid Free</title>
    <meta name="description" content="Find your remaining college costs after scholarships and financial aid. Free calculator shows your out of pocket cost per year and total over 4 years.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QFNEKR7QE0"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-QFNEKR7QE0');</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#f4f7fb;color:#333;}
        header{background:#2563eb;color:white;padding:20px;text-align:center;}
        header h1{font-size:24px;}
        .container{max-width:600px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .back-link{display:inline-block;margin-bottom:20px;color:#2563eb;text-decoration:none;font-size:14px;}
        h2{font-size:18px;margin-bottom:20px;color:#2563eb;}
        .input-group{margin-bottom:15px;}
        label{display:block;font-size:14px;color:#555;margin-bottom:5px;}
        input{padding:10px;border:1px solid #ddd;border-radius:6px;font-size:15px;width:100%;}
        .btn-calc{background:#2563eb;color:white;width:100%;padding:12px;font-size:16px;border:none;border-radius:6px;cursor:pointer;margin-top:10px;}
        .results{margin-top:25px;display:none;}
        .result-card{padding:20px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        .green{background:#f0fdf4;}
        .blue{background:#f0f7ff;}
        .red{background:#fef2f2;}
        .result-label{font-size:14px;color:#555;}
        .result-value{font-size:22px;font-weight:bold;}
        .green .result-value{color:#16a34a;}
        .blue .result-value{color:#2563eb;}
        .red .result-value{color:#dc2626;}
        footer{text-align:center;padding:20px;font-size:13px;color:#888;margin-top:20px;}
    </style>
</head>
<body>
    <header><h1>Scholarship Calculator</h1></header>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h2>Calculate Your College Costs</h2>
        <div class="input-group">
            <label>Total Annual College Cost ($)</label>
            <input type="number" id="cost" placeholder="e.g. 45000">
        </div>
        <div class="input-group">
            <label>Scholarship Amount ($)</label>
            <input type="number" id="scholarship" placeholder="e.g. 15000">
        </div>
        <div class="input-group">
            <label>Other Financial Aid ($)</label>
            <input type="number" id="aid" placeholder="e.g. 5000">
        </div>
        <div class="input-group">
            <label>Number of Years</label>
            <input type="number" id="years" placeholder="e.g. 4" min="1" max="8">
        </div>
        <button class="btn-calc" onclick="calculate()">Calculate</button>
        <div class="results" id="results">
            <div class="result-card green"><span class="result-label">Total Scholarships & Aid</span><span class="result-value" id="total-aid">$0</span></div>
            <div class="result-card blue"><span class="result-label">Remaining Cost Per Year</span><span class="result-value" id="per-year">$0</span></div>
            <div class="result-card red"><span class="result-label">Total Out of Pocket</span><span class="result-value" id="total-cost">$0</span></div>
        </div>
    </div>
    <footer>© 2025 StudentCalcTools — Free tools for students</footer>
    <script>
        function calculate(){
            const cost=parseFloat(document.getElementById('cost').value)||0;
            const scholarship=parseFloat(document.getElementById('scholarship').value)||0;
            const aid=parseFloat(document.getElementById('aid').value)||0;
            const years=parseFloat(document.getElementById('years').value)||1;
            const totalAid=scholarship+aid;
            const perYear=cost-totalAid;
            const totalCost=perYear*years;
            document.getElementById('total-aid').textContent='$'+totalAid.toLocaleString();
            document.getElementById('per-year').textContent='$'+perYear.toLocaleString();
            document.getElementById('total-cost').textContent='$'+totalCost.toLocaleString();
            document.getElementById('results').style.display='block';
        }
    </script>
</body>
</html>
