<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essay Word Counter - Count Words, Characters & Sentences Free</title>
    <meta name="description" content="Free online essay word counter. Count words, characters, sentences and paragraphs in your essay instantly.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QFNEKR7QE0"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-QFNEKR7QE0');</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial,sans-serif;background:#f4f7fb;color:#333;}
        header{background:#2563eb;color:white;padding:20px;text-align:center;}
        header h1{font-size:24px;}
        .container{max-width:700px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
        .back-link{display:inline-block;margin-bottom:20px;color:#2563eb;text-decoration:none;font-size:14px;}
        h2{font-size:18px;margin-bottom:20px;color:#2563eb;}
        textarea{width:100%;height:250px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:15px;resize:vertical;line-height:1.6;}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:20px;}
        .stat-card{background:#f0f7ff;padding:20px;border-radius:8px;text-align:center;}
        .stat-number{font-size:36px;font-weight:bold;color:#2563eb;}
        .stat-label{font-size:13px;color:#666;margin-top:5px;}
        .input-group{margin-top:15px;display:flex;gap:10px;align-items:center;}
        .input-group label{font-size:14px;color:#555;white-space:nowrap;}
        .input-group input{padding:8px;border:1px solid #ddd;border-radius:6px;width:100px;}
        .limit-status{margin-top:10px;font-size:14px;padding:10px;border-radius:6px;display:none;}
        .under{background:#f0fdf4;color:#16a34a;}
        .over{background:#fef2f2;color:#dc2626;}
        footer{text-align:center;padding:20px;font-size:13px;color:#888;margin-top:20px;}
    </style>
</head>
<body>
    <header><h1>Essay Word Counter</h1></header>
    <div class="container">
        <a href="index.html" class="back-link">← Back to All Tools</a>
        <h2>Paste Your Essay Below</h2>
        <textarea id="essay" placeholder="Paste or type your essay here..." oninput="count()"></textarea>
        <div class="input-group">
            <label>Word Limit:</label>
            <input type="number" id="limit" placeholder="e.g. 500" oninput="count()">
        </div>
        <div class="limit-status" id="limit-status"></div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="words">0</div><div class="stat-label">Words</div></div>
            <div class="stat-card"><div class="stat-number" id="chars">0</div><div class="stat-label">Characters</div></div>
            <div class="stat-card"><div class="stat-number" id="sentences">0</div><div class="stat-label">Sentences</div></div>
            <div class="stat-card"><div class="stat-number" id="paragraphs">0</div><div class="stat-label">Paragraphs</div></div>
        </div>
    </div>
    <footer>© 2025 StudentCalcTools — Free tools for students</footer>
    <script>
        function count(){
            const text=document.getElementById('essay').value;
            const words=text.trim()===''?0:text.trim().split(/\s+/).length;
            const chars=text.length;
            const sentences=text.split(/[.!?]+/).filter(s=>s.trim().length>0).length;
            const paragraphs=text.split(/\n+/).filter(p=>p.trim().length>0).length;
            document.getElementById('words').textContent=words;
            document.getElementById('chars').textContent=chars;
            document.getElementById('sentences').textContent=sentences;
            document.getElementById('paragraphs').textContent=paragraphs;
            const limit=parseInt(document.getElementById('limit').value);
            const statusDiv=document.getElementById('limit-status');
            if(limit){
                const diff=limit-words;
                if(diff>=0){statusDiv.className='limit-status under';statusDiv.textContent=`✅ You are ${diff} words under the limit.`;}
                else{statusDiv.className='limit-status over';statusDiv.textContent=`❌ You are ${Math.abs(diff)} words over the limit.`;}
                statusDiv.style.display='block';
            } else {statusDiv.style.display='none';}
        }
    </script>
</body>
</html>
